<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aantal zonneparken naar grootte park</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --geel:#FFC72C;
    --oranje:#F39200;
    --dieporanje:#ED6E3C;
    --rood:#E30613;
    --blauw:#1D9DD9;
    --tekst:#1e1e1d;
    --grijs:#6b6b69;
    --grid:#e7e7e4;
    --wit:#ffffff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;
    background:var(--wit);
    color:var(--tekst);
    -webkit-font-smoothing:antialiased;
  }
  .figure{
    max-width:780px;
    margin:0 auto;
    background:var(--wit);
    padding:8px 4px 20px;
  }
  .fig-title{
    display:flex;
    align-items:baseline;
    gap:8px;
    flex-wrap:wrap;
    padding:18px 8px 6px;
    border-bottom:none;
  }
  .fig-title .label{
    font-weight:800;
    font-size:15px;
    color:var(--oranje);
    white-space:nowrap;
  }
  .fig-title .desc{
    font-style:italic;
    font-size:15px;
    color:var(--oranje);
    font-weight:600;
  }
  .legend{
    display:flex;
    justify-content:flex-end;
    gap:22px;
    padding:10px 12px 2px;
    flex-wrap:wrap;
  }
  .legend .item{
    display:flex;
    align-items:center;
    gap:7px;
    font-size:13px;
    color:var(--tekst);
  }
  .legend .dot{
    width:11px;height:11px;border-radius:50%;
    display:inline-block;
  }
  .chart-wrap{
    padding:6px 8px 4px;
    position:relative;
    height:430px;
  }
  .source{
    font-size:11.5px;
    color:var(--grijs);
    font-style:italic;
    padding:10px 12px 0;
    line-height:1.5;
  }
  .source sup{font-style:normal;}
  @media (max-width:560px){
    .chart-wrap{height:400px;}
    .fig-title .label,.fig-title .desc{font-size:13.5px;}
    .legend{gap:14px;}
  }
</style>
</head>
<body>
<div class="figure">
  <div class="fig-title">
    <span class="label">Figuur 1:</span>
    <span class="desc">Aantal zonneparken naar grootte park in Nederland</span>
  </div>
  <div class="legend">
    <span class="item"><span class="dot" style="background:#F39200;"></span>2020</span>
    <span class="item"><span class="dot" style="background:#FFC72C;"></span>2025</span>
  </div>
  <div class="chart-wrap">
    <canvas id="zonneparkenChart"></canvas>
  </div>
  <div class="source">Bron: Kadaster</div>
</div>

<script>
(function(){
  const labels = ['Tot 70 m\u00B2','70 tot 1.000 m\u00B2','1.000 m\u00B2 tot 1 ha','1 tot 5 ha','5 ha en groter'];
  const data2020 = [1860, 980, 160, 100, 50];
  const data2025 = [6960, 4090, 420, 330, 240];

  const fmt = function(n){ return n.toLocaleString('nl-NL'); };

  const ctx = document.getElementById('zonneparkenChart').getContext('2d');

  Chart.defaults.font.family = "-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif";
  Chart.defaults.font.size = 12.5;
  Chart.defaults.color = '#1e1e1d';

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        {
          label: '2020',
          data: data2020,
          backgroundColor: '#F39200',
          borderWidth: 0,
          borderRadius: 0,
          maxBarThickness: 46
        },
        {
          label: '2025',
          data: data2025,
          backgroundColor: '#FFC72C',
          borderWidth: 0,
          borderRadius: 0,
          maxBarThickness: 46
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { top: 8, right: 6 } },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#ffffff',
          titleColor: '#1e1e1d',
          bodyColor: '#1e1e1d',
          borderColor: '#F39200',
          borderWidth: 1.5,
          cornerRadius: 2,
          padding: 11,
          titleFont: { weight: '700', size: 13 },
          bodyFont: { size: 12.5 },
          displayColors: true,
          boxWidth: 10,
          boxHeight: 10,
          usePointStyle: true,
          callbacks: {
            label: function(c){
              return '  ' + c.dataset.label + ': ' + fmt(c.parsed.y) + ' parken';
            }
          }
        }
      },
      scales: {
        x: {
          grid: { display: false, drawBorder: true },
          border: { color: '#cfcfcc' },
          ticks: { color: '#1e1e1d', font: { size: 12 }, maxRotation: 0, autoSkip: false }
        },
        y: {
          beginAtZero: true,
          grid: { color: '#e7e7e4', drawBorder: false },
          border: { display: false },
          ticks: {
            color: '#6b6b69',
            font: { size: 12 },
            callback: function(v){ return fmt(v); }
          },
          title: {
            display: true,
            text: 'Aantal zonneparken',
            color: '#6b6b69',
            font: { size: 12.5, weight: '600' }
          }
        }
      }
    }
  });
})();
</script>
</body>
</html>
